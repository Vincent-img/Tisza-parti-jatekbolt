<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosár - Tiszaparti Játékbolt</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header>
        <div class="csik-fent">
            <div class="logo">
                <img src="img/logo.png" alt="Logo">
            </div>
            <div>
                <a href="index.html">Vissza a főoldalra</a>
                <a href="kosar.html">Kosár</a>
            </div>
        </div>
    </header>

    <main class="kosar-oldal-container">
        <div class="kosar-felso-resz">
            
            <div class="kosar-bal-blokk">
                <div class="nagy-termek-doboz">
                    <img id="dinamikus-kep" src="" alt="Válassz egy terméket!">
                </div>
                <div class="termek-leiras">
                    <h2 id="dinamikus-nev">A kosarad jelenleg üres.</h2>
                </div>
            </div>

            <div class="kosar-jobb-blokk">
                <div class="figma-ar-gomb" id="dinamikus-ar">0 Ft</div>
                <button class="figma-kosarba-gomb">Megrendelés</button>
            </div>

        </div>
    </main>

    <footer>
        <div class="csik-lent">
            <p>tiszaparti játékbolt ZRT. A volán csoport közreműködője</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
